<!DOCTYPE html>

    <style>

      }

      header {
        background: linear-gradient(135deg, #184d47, #2d6a4f);
        color: #fff;
        padding: 2.5rem 1rem;
        text-align: center;
      }

      main {
        max-width: 900px;
        margin: -2rem auto 4rem;
        padding: 0 1rem;
      }

      .card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 20px 40px rgba(24, 77, 71, 0.1);
        margin-bottom: 2rem;
        padding: 2rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 28px 50px rgba(24, 77, 71, 0.14);
      }

      h1 {
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
      }

      p.lead {
        font-size: 1.1rem;
        margin: 0 auto;
        max-width: 720px;
        line-height: 1.8;
      }

      h2 {
        color: #184d47;
        font-size: 1.6rem;
        margin-bottom: 1rem;
      }

      p.summary {
        line-height: 1.8;
        margin-bottom: 1.2rem;
      }

      ul {
        padding-left: 1.2rem;
        margin: 0;
        line-height: 1.7;
      }

      footer {
        text-align: center;
        padding: 2rem 1rem;
        font-size: 0.9rem;
        color: #52606d;
      }

      .api-link {
        display: inline-block;
        margin-top: 1rem;
        color: #2d6a4f;
        text-decoration: none;
        font-weight: 600;
      }

      .api-link:hover {
        text-decoration: underline;
      }

      @media (max-width: 600px) {
        header {
          padding: 2rem 1rem;
        }

        h1 {
          font-size: 1.8rem;
        }

        .card {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>

        애플리케이션입니다.
      </p>

    <main>
